<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Pippin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f4f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #111827;
        }

        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 500;
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.1);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: #c084fc;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #a855f7;
        }

        .error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            min-height: 20px;
        }

        .setup-warning {
            display: none;
            background: #fffbeb;
            color: #b45309;
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            border: 1px solid #fde68a;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div id="setupWarning" class="setup-warning">
            Supabase is not configured. Please add your credentials to <code>supabase-config.js</code>.
        </div>

        <h1>Pippin Admin Log In</h1>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button id="loginBtn">Sign In to Dashboard</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        if (!supabaseClient) {
            document.getElementById('setupWarning').style.display = 'block';
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            if (!supabaseClient) {
                // Bypass for mockup purposes if no supabase configured
                window.location.href = 'admin-dashboard.html';
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.innerText = '';
            btn.innerText = 'Signing in...';
            btn.disabled = true;

            const res = await supabaseClient.auth.signInWithPassword({ email, password });

            if (res.error) {
                errorMsg.innerText = res.error.message;
                btn.innerText = 'Sign In to Dashboard';
                btn.disabled = false;
            } else {
                window.location.href = 'admin-dashboard.html';
            }
        });

        // Check if already logged in
        if (supabaseClient) {
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) window.location.href = 'admin-dashboard.html';
            });
        }
    </script>
</body>

</html>
